name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '25'
  MAVEN_OPTS: '-Xmx1024m'
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ==================== BUILD & TEST ====================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: terrenos_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -B

      - name: Run unit tests
        run: mvn test -B -Dspring.profiles.active=test

      - name: Package (skip tests)
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          retention-days: 3

  # ==================== SECURITY TESTS ====================
  security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: terrenos_security
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run multi-tenancy isolation tests
        run: mvn test -B -Dtest=SeguridadE2ETest -Dspring.profiles.active=test

      - name: Run auth security tests
        run: mvn test -B -Dtest=AuthE2ETest -Dspring.profiles.active=test

  # ==================== E2E FULL SUITE ====================
  e2e:
    name: E2E Full Suite
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: terrenos_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run full E2E suite
        run: mvn test -B -Dspring.profiles.active=test

  # ==================== CODE QUALITY ====================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify compilation
        run: mvn compile -B

      - name: Check dependencies
        run: mvn dependency:analyze -B -DfailOnWarning=false

  # ==================== DOCKER BUILD ====================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, security, e2e]
    timeout-minutes: 15
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== DEPLOY STAGING ====================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build, security, e2e, docker]
    timeout-minutes: 10
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.terrenos.example.com

    steps:
      - name: Deploy to staging
        env:
          DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:develop"
          echo "DB Host: $DB_HOST"
          # Add your deployment commands here (e.g., kubectl, SSH, etc.)
          # kubectl set image deployment/terrenos-backend backend=${{ env.DOCKER_IMAGE }}:develop

  # ==================== DEPLOY PRODUCTION ====================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, security, e2e, docker]
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://terrenos.example.com

    steps:
      - name: Deploy to production
        env:
          DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
        run: |
          echo "Deploying to production environment..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:main"
          echo "DB Host: $DB_HOST"
          # Add your deployment commands here
          # kubectl set image deployment/terrenos-backend backend=${{ env.DOCKER_IMAGE }}:main
