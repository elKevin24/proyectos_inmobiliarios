name: Backend CI/CD

on:
  push:
    branches: [ main, develop, 'claude/**' ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'pom.xml'

jobs:
  # ==========================================
  # Job 1: Build y Test
  # ==========================================
  build-and-test:
    name: Build and Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ '25' ]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🔧 Verify Maven version
        run: mvn --version

      - name: 🏗️ Build with Maven
        run: mvn clean compile -B -V

      - name: 🧪 Run Unit Tests
        run: mvn test -B

      - name: 📊 Generate Test Report
        if: always()
        run: mvn surefire-report:report

      - name: 📈 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java }}
          path: target/surefire-reports/

      - name: 🐳 Run Integration Tests (Testcontainers)
        run: mvn verify -B
        env:
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: 📦 Package JAR
        run: mvn package -DskipTests -B

      - name: 📤 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-java-${{ matrix.java }}
          path: target/*.jar
          retention-days: 7

  # ==========================================
  # Job 2: Code Quality & Security
  # ==========================================
  code-quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Para análisis completo

      - name: ☕ Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔍 Run Checkstyle
        run: mvn checkstyle:check || true
        continue-on-error: true

      - name: 🔒 OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check || true
        continue-on-error: true

      - name: 📊 Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: target/dependency-check-report.html
        continue-on-error: true

  # ==========================================
  # Job 3: Build Docker Image
  # ==========================================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: terrenos-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Opcional: Si tienes Docker Hub o GitHub Container Registry
      # - name: 🔑 Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      #
      # - name: 📤 Push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./backend
      #     push: true
      #     tags: ${{ steps.meta.outputs.tags }}

  # ==========================================
  # Job 4: Notify on Success/Failure
  # ==========================================
  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, docker-build]
    if: always()

    steps:
      - name: ✅ Success Notification
        if: ${{ needs.build-and-test.result == 'success' }}
        run: |
          echo "✅ Build exitoso!"
          echo "🎉 Todos los tests pasaron"

      - name: ❌ Failure Notification
        if: ${{ needs.build-and-test.result == 'failure' }}
        run: |
          echo "❌ Build falló"
          echo "🔍 Revisa los logs para más detalles"
          exit 1
