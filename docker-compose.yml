version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:14-alpine
    container_name: terrenos-postgres
    environment:
      POSTGRES_DB: terrenos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - terrenos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (opcional, para gestión visual de BD)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: terrenos-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@terrenos.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - terrenos-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  terrenos-network:
    driver: bridge

  # Backend Java Spring Boot
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terrenos-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/terrenos_db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - SPRING_PROFILES_ACTIVE=dev
      - CV_ENGINE_URL=http://cv-engine:8000
    volumes:
      - ./uploads:/app/uploads
    networks:
      - terrenos-network
    depends_on:
      postgres:
        condition: service_healthy

  # Microservicio Computer Vision (Python)
  cv-engine:
    build:
      context: ./cv-engine
      dockerfile: Dockerfile
    container_name: terrenos-cv-engine
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - terrenos-network

